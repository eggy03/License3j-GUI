writer1        = console
writer1.format = {date: HH:mm:ss.SSS} {level}:\n{message}\n

writer2           = file
writer2.format    = {level}:\n{message}\n
writer2.file      = logs/currentsession.log
writer2.charset   = UTF-8
writer2.buffered  = true
writer2.append    = false
writer2.exception = keep:app # keeps only the app package stacktrace

writer3 = custom log
writer3.format = {date: HH:mm:ss.SSS} {level}: {message}\n

writingthread = true